<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cloud Music</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .pin-box { background: #282828; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 90%; width: 350px; }
        .pin-input { width: 100%; padding: 15px; font-size: 1.5rem; letter-spacing: 5px; text-align: center; margin: 20px 0; border: none; border-radius: 8px; background: #333; color: white; outline: none; }
        .btn-unlock { background: #1db954; color: white; border: none; padding: 12px 30px; font-size: 1rem; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; }
        .error-msg { color: #e74c3c; margin-top: 15px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="pin-box">
            <h2>🔒 Bảo Mật</h2>
            <p style="color:#aaa; font-size:0.9rem;">Vui lòng nhập mã PIN (anhnn@dgd.vn)</p>
            <input type="password" id="pinInput" class="pin-input" maxlength="6" placeholder="******" pattern="[0-9]*" inputmode="numeric" autofocus>
            <button class="btn-unlock" onclick="submitPin()">MỞ KHÓA</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div class="header">
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px;">
            <h2 style="font-size: 1.2rem; margin: 0;">☁️ N.Anh's Music (<span id="count">0</span>)</h2>
            <button class="btn-icon-only" onclick="updateLibrary()" id="btnScan" title="Cập nhật" style="width: 30px; height: 30px; font-size: 1rem;">
                <span id="scanIcon">🔄</span>
            </button>
        </div>
        
        <div class="controls-top">
            <button id="btnSearchToggle" class="btn-icon-only" onclick="toggleSearch()" title="Tìm kiếm">🔎</button>
            
            <select id="folderFilter" onchange="filterPlaylist()">
                <option value="favorites">❤️ Bài hát yêu thích</option>
                <option value="all" selected>📁 Tất cả thư mục</option>
            </select>
            
            <input type="text" id="searchInput" placeholder="Gõ tên bài hát..." oninput="searchSongs()">
            
            <button class="btn-icon-only" onclick="toggleDownloaderView()" id="btnDownloadView" title="Tải nhạc mới">⬇️</button>
        </div>
    </div>

    <div id="playlist">Đang tải...</div>

    <div id="downloaderView">
        <div class="dl-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0">⬇️ Tải Nhạc Từ YouTube</h3>
                <button class="btn-icon-only" onclick="resetUI()" title="Quay lại bước nhập Link" style="width:36px; height:36px; font-size:1rem;">
                ⬅️
                </button>
            </div>

            <p style="color: #aaa; margin-bottom: 20px;">Dán link YouTube (Video/Playlist). Hệ thống sẽ xử lý tuần tự.</p>
            
            <input type="text" id="dlLink" class="dl-input" placeholder="https://youtube.com/..." autofocus>
            <button id="btnCheck" class="btn-full" onclick="checkLink()">🔎 Kiểm Tra Thông Tin</button>

            <div id="dlPreview" class="dl-preview">
                <img id="dlImg" class="dl-thumb" src="" alt="Thumbnail">
                <div class="dl-info">
                    <h3 id="dlTitle">...</h3>
                    <p>👤 <span id="dlUploader">...</span></p>
                    <p>📂 <span id="dlType">...</span></p>
                    <p>🎵 <span id="dlCount" style="color:white; font-weight:bold;">...</span> bài hát</p>
                </div>
            </div>

            <div id="videoListBox" class="video-list-box"></div>

            <div id="dlControls" style="display: none; flex-direction: column; gap: 10px; margin-top: 15px;">
                <div style="display: flex; gap: 10px;">
                    <button id="btnDownloadAll" class="btn-full" onclick="startDownload('all')" style="margin-top:0; flex: 1;">⬇️ TẢI TOÀN BỘ</button>
                    <button id="btnSelectMode" class="btn-full btn-outline" onclick="toggleSelectionMode()" style="margin-top:0; flex: 1; display:none;">📝 TẢI TÙY CHỌN</button>
                </div>
                
                <button id="btnDownloadSelected" class="btn-full" onclick="startDownload('selected')" style="margin-top:0; display:none;">⬇️ TẢI CÁC BÀI ĐÃ CHỌN</button>
                
                <button id="btnStop" class="btn-full" onclick="requestStop()" style="background-color: #e74c3c; display: none; margin-top:0;">🛑 DỪNG LẠI</button>
            </div>

            <div id="consoleBox" class="console-box">
                <div style="color:white; border-bottom:1px solid #555; margin-bottom:10px;">🖥️ SYSTEM LOGS:</div>
                <div id="logContent"></div>
            </div>

            <p id="dlStatus" class="status-msg"></p>
        </div>
    </div>

    <div class="player-bar">
        <div id="statusBar" class="status-bar">Sẵn sàng</div>
        <div class="playback-settings" style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
            
            <label class="setting-item" title="Luôn phát lại từ 0:00, bỏ qua lịch sử" style="margin:0;">
                <input type="checkbox" id="cbPlayFromStart" onclick="toggleSettingMode('start')"> 
                <span>Phát từ đầu</span>
            </label>
            
            <label class="setting-item" title="Tự động bỏ qua đoạn đầu và cuối" style="margin:0;">
                <input type="checkbox" id="cbSkipMode" onclick="toggleSettingMode('skip')"> 
                <span>Bỏ qua: 
                    <input type="number" id="inpSkipStart" value="5" min="0" style="width:30px; text-align:center; padding:2px;" 
                        onclick="event.stopPropagation()" onchange="savePlaybackSettings()">s đầu 
                    & 
                    <input type="number" id="inpSkipEnd" value="10" min="0" style="width:30px; text-align:center; padding:2px;" 
                        onclick="event.stopPropagation()" onchange="savePlaybackSettings()">s cuối
                </span>
            </label>

            <div class="setting-item" style="display: flex; align-items: center; gap: 5px; margin:0;">
                <span>Tốc độ:</span>
                <button onclick="changeSpeed(-0.01)" style="
                    width: 24px; height: 24px; cursor: pointer; border-radius: 4px; border: 1px solid #555; 
                    background: #333; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    -
                </button>
                
                <span id="speedDisplay" onclick="resetSpeed()" title="Bấm để đặt lại về 1.00" style="
                    font-weight: bold; min-width: 40px; text-align: center; cursor: pointer; user-select: none;">
                    1.00
                </span>
                
                <button onclick="changeSpeed(0.01)" style="
                    width: 24px; height: 24px; cursor: pointer; border-radius: 4px; border: 1px solid #555; 
                    background: #333; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    +
                </button>
            </div>

        </div>    
        <div class="player-header">
            <div class="now-playing" id="songTitle">Chưa chọn bài hát</div>
            <button id="playerHeart" class="btn-heart btn-heart-player" onclick="toggleFavoriteCurrent()">🤍</button>
        </div>
        <div class="progress-container">
            <span id="currTime">0:00</span>
            <input type="range" id="seekBar" value="0" min="0" step="1" oninput="seekAudio()">
            <span id="totalTime">0:00</span>
        </div>
        <div class="audio-controls">
            <button class="btn-control" onclick="toggleShuffle()" id="btnShuffle">🔀</button>
            <button class="btn-control" onclick="playPrev()">⏮️</button>
            <button class="btn-control btn-main" onclick="togglePlay()" id="btnPlay">▶️</button>
            <button class="btn-control" onclick="playNext(true)">⏭️</button>
            <button class="btn-control" onclick="toggleLoop()" id="btnLoop">🔁</button>
        </div>
        <audio id="audio" style="display:none;" preload="metadata"></audio>
    </div>

    <script src="index.js"></script>
    <script src="downloader.js"></script>

    <script>
        // --- LOGIC PIN & AUTH (GIỮ NGUYÊN) ---
        const pinInput = document.getElementById('pinInput');
        const btnUnlock = document.querySelector('.btn-unlock');

        pinInput.addEventListener("input", function() { if (this.value.length === 6) submitPin(); });
        pinInput.addEventListener("keypress", function(event) { if (event.key === "Enter") submitPin(); });

        async function submitPin() {
            const pin = pinInput.value;
            const errDiv = document.getElementById('loginError');
            if(!pin || pin.length < 6) return;
            btnUnlock.disabled = true; btnUnlock.innerText = "⏳"; pinInput.disabled = true; errDiv.innerText = "";

            try {
                const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ pin }) });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('loginOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loginOverlay').style.display = 'none';
                        if(typeof init === 'function') init();
                    }, 500);
                } else {
                    errDiv.innerText = data.error || "Mã PIN không đúng";
                    setTimeout(() => { pinInput.value = ""; pinInput.disabled = false; pinInput.focus(); btnUnlock.disabled = false; btnUnlock.innerText = "MỞ KHÓA"; }, 1000);
                }
            } catch (e) { errDiv.innerText = "Lỗi kết nối server!"; pinInput.disabled = false; btnUnlock.disabled = false; btnUnlock.innerText = "MỞ KHÓA"; }
        }

        (async function checkAuth() {
            try {
                const res = await fetch('/api/auth-status');
                const data = await res.json();
                if (data.authenticated) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    if(typeof init === 'function') init();
                } else { pinInput.focus(); }
            } catch(e) {}
        })();
    </script>
</body>
</html>
